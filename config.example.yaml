server:
  host: "0.0.0.0"
  port: 12345

upstream:
  base_url: "https://api.minimaxi.com/v1"
  # path: "/chat/completions"  # Optional: override the auto-detected path
  api_key: "${API_KEY}"
  model: "MiniMax-M2.5"
  format: "chat"
  model_map:
    "claude-sonnet-4-5": "MiniMax-M2.5"
    "gpt-4o": "MiniMax-M2.5"

providers:
  minimax:
    name: "MiniMax"
    base_url: "https://api.minimaxi.com/v1"
    api_key: "${MINIMAX_API_KEY}"
    model: "MiniMax-M2.5"
    format: "chat"
    logo_url: ""
    sponsor: true
  deepseek:
    name: "DeepSeek"
    base_url: "https://api.deepseek.com/v1"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    format: "chat"
    logo_url: ""
    sponsor: true
  zhipu:
    name: "Zhipu"
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "${ZHIPU_API_KEY}"
    format: "anthropic"

routes:
  "gw-zhipu":
    provider: "zhipu"
    default_model: "glm-5.1"
    scene_map:
      default: "glm-5.1"
      background: "glm-4.5-air"
      think: "glm-5.1"
      websearch: "glm-4.7"
    model_map:
      "gpt-4o": "glm-5.1"
  "gw-deepseek":
    provider: "deepseek"
    default_model: "deepseek-chat"
