server:
  host: "0.0.0.0"
  port: 12345

default_provider: "minimax"

providers:
  minimax:
    name: "MiniMax"
    # /v1 suffix is auto-stripped — you can use either format
    base_url: "https://api.minimaxi.com"
    api_key: "${MINIMAX_API_KEY}"
    model: "MiniMax-M2.5"
    format: "chat"
    model_map:
      "claude-sonnet-4-5": "MiniMax-M2.5"
      "gpt-4o": "MiniMax-M2.5"
    # Strip think tags from responses (optional, for reasoning models)
    # think_tag: "think"
    logo_url: ""
    sponsor: true
  deepseek:
    name: "DeepSeek"
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    format: "chat"
    logo_url: ""
    sponsor: true
  zhipu:
    name: "Zhipu"
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "${ZHIPU_API_KEY}"
    format: "anthropic"

# Routes: map key is the gateway API key used by clients for authentication
routes:
  "gw-zhipu":
    provider: "zhipu"
    default_model: "glm-5.1"
    scene_map:
      default: "glm-5.1"
      background: "glm-4.5-air"
      think: "glm-5.1"
      websearch: "glm-4.7"
    model_map:
      "gpt-4o": "glm-5.1"
  "gw-deepseek":
    provider: "deepseek"
    default_model: "deepseek-chat"
