server:
  host: "0.0.0.0"
  port: 12345
  # IP whitelist (required when host is not 127.0.0.1/localhost)
  # allowed_ips:
  #   - "192.168.1.0/24"
  #   - "10.0.0.5"

# Number of days to retain log files (default: 30)
# log_retention_days: 30

default_route: "gw-default"
# Protocol-specific defaults (optional, override default_route per protocol)
# default_anthropic_route: "gw-zhipu"    # /v1/messages (Claude Code)
# default_responses_route: "gw-default"  # /v1/responses (Codex CLI)
# default_chat_route: "gw-default"       # /v1/chat/completions

providers:
  minimax:
    name: "MiniMax"
    # /v1 suffix is handled automatically — use whichever format your provider documents
    base_url: "https://api.minimaxi.com"
    api_key: "${MINIMAX_API_KEY}"
    # Fallback keys for 429 rate limit (optional, tried in order on 429)
    # fallback_keys:
    #   - "${MINIMAX_API_KEY_2}"
    #   - "${MINIMAX_API_KEY_3}"
    format: "chat"
    # Strip think tags from responses (optional, for reasoning models)
    # think_tag: "think"
    logo_url: ""
    models:
      - "MiniMax-M2.5"
  deepseek:
    name: "DeepSeek"
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
    format: "chat"
    logo_url: ""
    models:
      - "deepseek-chat"
      - "deepseek-reasoner"
  zhipu:
    name: "Zhipu"
    base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "${ZHIPU_API_KEY}"
    format: "anthropic"
    models:
      - "glm-5.1"
      - "glm-4.7"
      - "glm-4.5-air"

# Routes: map key is the gateway API key used by clients for authentication
routes:
  "gw-default":
    provider: "minimax"
    default_model: "MiniMax-M2.5"
    scene_map:
      default: "MiniMax-M2.5"
      think: "deepseek:deepseek-chat"
      websearch: "MiniMax-M2.5"
      background: "MiniMax-M2.5"
  "gw-zhipu":
    provider: "zhipu"
    default_model: "glm-5.1"
    scene_map:
      default: "glm-5.1"
      background: "glm-4.5-air"
      think: "glm-5.1"
      websearch: "glm-4.7"
    model_map:
      "gpt-4o": "glm-5.1"
  "gw-deepseek":
    provider: "deepseek"
    default_model: "deepseek-chat"
